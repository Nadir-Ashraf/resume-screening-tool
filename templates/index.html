<!DOCTYPE html>
<html>

<head>
<title>AI Resume Screening Tool</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>AI Resume Screening Tool</h1>
<p class="subtitle">Match resumes with job descriptions using AI</p>

<form action="/upload" method="post" enctype="multipart/form-data">

<div class="form-group">

<label>Job Description</label>

<textarea 
name="jd" 
placeholder="Paste the job description here..."
required>
</textarea>

</div>


<div class="form-group">

<label>Upload Resumes</label>

<input 
type="file" 
name="resumes" 
multiple 
required>

</div>

<button type="submit">Screen Resumes</button>

</form>

</div>

</body>
</html>
