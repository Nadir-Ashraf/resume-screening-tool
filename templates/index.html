<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screening Tool</title>
</head>
<body>

<h2>Upload Resumes</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    
    Job Description:<br>
    <textarea name="jd" rows="6" cols="50"></textarea><br><br>

    Upload Resumes:<br>
    <input type="file" name="resumes" multiple><br><br>

    <input type="submit" value="Screen Resumes">

</form>

</body>
</html>
