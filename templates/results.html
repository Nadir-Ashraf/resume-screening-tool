<!DOCTYPE html>
<html>

<head>
<title>Screening Results</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Resume Ranking Results</h1>

<table>

<tr>
<th>Rank</th>
<th>Resume</th>
<th>Similarity Score</th>
</tr>

{% for r in results %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ r.resume }}</td>
<td>{{ r.score }}</td>
</tr>

{% endfor %}

</table>

<a href="/" class="back-btn">Upload More Resumes</a>

</div>

</body>
</html>
